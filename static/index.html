<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杏铃同步台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="text-gray-800 p-8 font-sans">

<div id="app" class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8 border-b border-gray-200 pb-4">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold text-gray-900">杏铃同步台</h1>
            <div class="flex gap-2">
                <a v-if="appInfo.bot.username" :href="'https://t.me/' + appInfo.bot.username" target="_blank" class="text-sm font-normal text-blue-600 hover:text-blue-800 hover:underline flex items-center bg-blue-50 px-2 py-1 rounded transition">
                    🤖 {{ appInfo.bot.name }} (@{{ appInfo.bot.username }})
                </a>
                <span v-if="appInfo.user.name" class="text-sm font-normal text-purple-600 flex items-center bg-purple-50 px-2 py-1 rounded">👤 {{ appInfo.user.name }}</span>
            </div>
        </div>
        <a href="https://github.com/RRHTY/tg-channel-sync" target="_blank" class="text-gray-500 hover:text-gray-800 transition flex items-center gap-1 text-sm">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
            GitHub
        </a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="space-y-6">
            <channel-mapping :mappings="mappings" @add="addMapping" @del="deleteMapping"></channel-mapping>
            <sync-panel :status="syncStatus" :form="syncForm" :stopping="stopping" @start="startSync" @stop="stopSync"></sync-panel>
        </div>

        <div class="space-y-6">
            <global-filters
                :settings="settings" :rules="filterRules" :new-rule="newFilter"
                @save-settings="saveSettings" @add-rule="addFilter" @del-rule="deleteFilter">
            </global-filters>
        </div>
    </div>

    <log-viewer :sys-logs="sysLogs" :msg-logs="msgLogs"></log-viewer>
</div>

<script src="/static/app.js"></script>
</body>
</html>
