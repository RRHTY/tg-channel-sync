<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杏铃同步台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="text-gray-800 p-8 font-sans">

<div id="app" class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8 border-b border-gray-200 pb-4">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold text-gray-900">杏铃同步台</h1>
            <div class="flex gap-2">
                <a v-if="appInfo.bot.username" :href="'https://t.me/' + appInfo.bot.username" target="_blank" class="text-sm font-normal text-blue-600 hover:text-blue-800 hover:underline flex items-center bg-blue-50 px-2 py-1 rounded transition">
                    🤖 {{ appInfo.bot.name }} (@{{ appInfo.bot.username }})
                </a>
                <span v-if="appInfo.user.name" class="text-sm font-normal text-purple-600 flex items-center bg-purple-50 px-2 py-1 rounded">👤 {{ appInfo.user.name }}</span>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="space-y-6">
            <channel-mapping :mappings="mappings" @add="addMapping" @del="deleteMapping"></channel-mapping>
            <sync-panel :status="syncStatus" :form="syncForm" :stopping="stopping" @start="startSync" @stop="stopSync"></sync-panel>
        </div>

        <div class="space-y-6">
            <global-filters
                :settings="settings" :rules="filterRules" :new-rule="newFilter"
                @save-settings="saveSettings" @add-rule="addFilter" @del-rule="deleteFilter">
            </global-filters>
        </div>
    </div>

    <log-viewer :sys-logs="sysLogs" :msg-logs="msgLogs"></log-viewer>
</div>

<script src="/static/app.js"></script>
</body>
</html>
